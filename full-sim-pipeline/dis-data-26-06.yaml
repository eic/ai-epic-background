# Simplified Configuration for Meson Structure Pipeline

# Base directory
base_dir: "/work/eic3/users/romanov/dis-csv-2026-06"

# 
# These are directories besides base_dir that will be bound inside the container
bind_dirs: [
  "${base_dir}",
  "/work/eic3/users/romanov"
]

# Container
container: "/cvmfs/singularity.opensciencegrid.org/eicweb/eic_xl:26.06.0-stable"

# Scripts location
scripts_dir: "/work/eic3/users/romanov/ai-epic-background/full-sim-pipeline"

# Test mode - set to true to test without actually submitting jobs
dry_run: false

# Energies to process
energies: 
  - "5x41"
  - "9x100"
  - "9x130"
  - "9x275"

# Number of events per job
event_count: 5000

# DD4Hep jobs
# afterburner_output is input here
dd4hep_input:  "${base_dir}/afterburner/${energy}-priority"
dd4hep_output: "${base_dir}/dd4hep/${energy}"

dd4hep_saveall_input:  "${base_dir}/afterburner/${energy}-priority"
dd4hep_saveall_output: "${base_dir}/dd4hep_saveall/${energy}"

csv_dd4hep_input: "${dd4hep_output}"
csv_dd4hep_output: "${base_dir}/csv_dd4hep${suffix}/${energy}"

# --- Rucio-driven CSV conversion (official campaign RECO on the grid) --------
# 42_create_datasets_list.py uses these to query Rucio and write one YAML per
# dataset into datasets_dir. 41_create_csv_eicrecon_jobs.py then detects those
# YAMLs and streams the root:// PFNs through the ROOT macros (no local copy).
rucio_did_filters: ""
rucio_did_pattern: "epic:/RECO/26.06.0/epic_craterlake/DIS/pythia8.316-1.0/NC/noRad/ep/*"
datasets_dir: "${base_dir}/dis-nc-26-06-v2"

# You can put a single dataset YAML in datasets_dir for testing, or glob multiple YAMLs for the full campaign.
#datasets_glob: "*.yaml"
datasets_glob: "*.yaml"

# Tokens stripped from the per-dataset slug (constant background config).
# Full DID is always preserved inside each dataset YAML.
slug_drop_tokens: ["pythia8.316-1.0", "noRad"]

# Cap files per dataset for testing (0 = all files).
max_files_per_dataset: 0

# CSV outputs go to <csv_eicrecon_output>/<slug>/ (and per-dataset jobs/logs).
csv_eicrecon_output: "${base_dir}/csv_eicrecon"